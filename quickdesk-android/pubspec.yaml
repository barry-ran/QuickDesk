name: quickdesk_android
description: QuickDesk Android client - AI-native remote desktop (controller + host roles)
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # WebRTC (same libwebrtc lineage as Chromium Remoting)
  flutter_webrtc: ^1.2.0

  # Protocol stack
  crypto: ^3.0.3
  xml: ^6.5.0
  http: ^1.2.0

  # App
  shared_preferences: ^2.2.0
  wakelock_plus: ^1.2.0
  cupertino_icons: ^1.0.8
  file_picker: 8.1.0
  path_provider: ^2.1.6
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
